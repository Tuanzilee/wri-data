<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寫作範本銀行 · Writing Template Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    --paper: #F5EFE2;
    --paper-tint: #EFE8D8;
    --card: #FBF6EA;
    --ink: #1F1815;
    --ink-soft: #4A3F35;
    --ink-muted: #8B7E6E;
    --line: #D8CDB6;
    --line-soft: #E8DFC9;
    --accent: #5D7558;        /* sage green */
    --accent-deep: #3E5239;
    --accent-soft: #DDE5D6;
    --warn: #B5634A;          /* burnt sienna */
    --warn-soft: #F0DDD3;
    --gold: #B08948;
    --shadow: 0 1px 2px rgba(31,24,21,.04), 0 4px 16px rgba(31,24,21,.04);
    --shadow-lift: 0 2px 4px rgba(31,24,21,.06), 0 12px 32px rgba(31,24,21,.08);
    --serif: "Fraunces", "Noto Serif TC", Georgia, serif;
    --sans: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(176,137,72,.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(93,117,88,.04) 0%, transparent 50%);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent-soft); color: var(--ink); }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* ============ LAYOUT ============ */
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  header.top {
    padding: 56px 0 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 0;
  }
  header.top .row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .brand h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    line-height: 1.1;
  }
  .brand h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent-deep);
  }
  .brand .sub {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    color: var(--ink-muted);
    font-size: 1rem;
    letter-spacing: 0.02em;
  }
  .brand .date {
    font-family: var(--serif);
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .meta-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    transition: all .2s ease;
    border: 1px solid transparent;
  }
  .icon-btn:hover { background: var(--card); border-color: var(--line); color: var(--ink); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ============ TABS ============ */
  nav.tabs {
    display: flex;
    gap: 4px;
    margin: 0;
    padding: 16px 0 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 400;
    padding: 12px 20px 14px;
    border-bottom: 2px solid transparent;
    color: var(--ink-muted);
    transition: all .2s ease;
    white-space: nowrap;
    margin-bottom: -1px;
    letter-spacing: 0.01em;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }
  .tab .num {
    font-family: var(--serif);
    font-size: 0.7rem;
    font-style: italic;
    color: var(--ink-muted);
    margin-left: 6px;
    vertical-align: super;
    font-weight: 300;
  }
  .tab.active .num { color: var(--accent); }

  /* ============ MAIN ============ */
  main { padding: 36px 0 80px; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn .3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ TOOLBAR ============ */
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .search {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 0.95rem;
    transition: all .2s ease;
  }
  .search input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .search svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--ink-muted);
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    transition: all .2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-primary:hover { background: var(--accent-deep); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { background: var(--card); border-color: var(--ink-soft); }
  .btn-warn {
    background: transparent;
    color: var(--warn);
    border: 1px solid transparent;
  }
  .btn-warn:hover { background: var(--warn-soft); }

  /* ============ FILTERS ============ */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-right: 4px;
  }
  .chip {
    padding: 5px 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 0.82rem;
    color: var(--ink-soft);
    transition: all .15s ease;
  }
  .chip:hover { border-color: var(--ink-muted); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .chip.diff-A.active { background: var(--accent); border-color: var(--accent); }
  .chip.diff-B.active { background: var(--gold); border-color: var(--gold); }
  .chip.diff-C.active { background: var(--warn); border-color: var(--warn); }

  /* ============ CARDS ============ */
  .card-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 20px 24px;
    transition: all .2s ease;
    position: relative;
  }
  .card:hover {
    border-color: var(--line);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 8px;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.4;
    margin: 0;
    flex: 1;
    color: var(--ink);
  }
  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity .2s ease;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    width: 28px; height: 28px;
    border-radius: 6px;
    color: var(--ink-muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
  }
  .card-actions button:hover { background: var(--paper-tint); color: var(--ink); }
  .card-actions button.danger:hover { background: var(--warn-soft); color: var(--warn); }
  .card-actions svg { width: 14px; height: 14px; }

  .card-meaning {
    font-size: 0.92rem;
    color: var(--ink-soft);
    margin: 4px 0 12px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
  }
  .card-example {
    font-size: 0.92rem;
    color: var(--ink-soft);
    line-height: 1.7;
    padding: 12px 14px;
    background: var(--paper-tint);
    border-radius: 8px;
    border-left: 3px solid var(--accent-soft);
    margin: 10px 0;
  }
  .card-example .lang-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.7rem;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 2px;
  }
  .card-example p { margin: 0 0 6px; }
  .card-example p:last-child { margin: 0; }

  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 0.75rem;
    padding: 3px 9px;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    color: var(--ink-muted);
    font-family: var(--serif);
    letter-spacing: 0.02em;
  }
  .difficulty-dot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-family: var(--serif);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-A { background: var(--accent); }
  .dot-B { background: var(--gold); }
  .dot-C { background: var(--warn); }

  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--ink-muted);
  }
  .empty svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 16px; }
  .empty h3 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 1.4rem;
    margin: 0 0 6px;
    color: var(--ink-soft);
  }
  .empty p { font-size: 0.9rem; margin: 0; }

  /* ============ MODAL ============ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(31, 24, 21, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    animation: overlayIn .2s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--paper);
    border-radius: 16px;
    width: 100%;
    max-width: 620px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lift);
    animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-head h2 {
    font-family: var(--serif);
    font-weight: 400;
    margin: 0;
    font-size: 1.4rem;
    letter-spacing: -0.01em;
  }
  .modal-body { padding: 24px 28px; }
  .modal-foot {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-family: var(--serif);
    font-size: 0.85rem;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 10px 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 0.95rem;
    transition: all .15s ease;
    font-family: var(--sans);
  }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field-hint {
    font-size: 0.78rem;
    color: var(--ink-muted);
    font-style: italic;
    margin-top: 4px;
    font-family: var(--serif);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .diff-picker {
    display: flex;
    gap: 8px;
  }
  .diff-opt {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    text-align: center;
    transition: all .15s ease;
    font-family: var(--serif);
    font-size: 0.9rem;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .diff-opt.selected.A { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-deep); }
  .diff-opt.selected.B { border-color: var(--gold); background: #F7EBD2; color: #6B4F1F; }
  .diff-opt.selected.C { border-color: var(--warn); background: var(--warn-soft); color: #843D26; }

  /* ============ PRACTICE ============ */
  .practice-setup {
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
  }
  .practice-setup h2 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    margin: 0 0 8px;
    font-size: 1.6rem;
  }
  .practice-setup .lead {
    color: var(--ink-muted);
    font-family: var(--serif);
    margin: 0 0 28px;
  }
  .practice-options {
    display: grid;
    gap: 14px;
    max-width: 380px;
    margin: 0 auto;
    text-align: left;
  }
  .practice-options .field { margin: 0; }

  .flashcard-wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  .practice-progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-muted);
    font-size: 0.9rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--line-soft);
    border-radius: 2px;
    overflow: hidden;
    margin: 8px 0 24px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width .3s ease;
  }

  .flashcard {
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 16px;
    padding: 48px 40px;
    min-height: 280px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .flashcard .face-label {
    position: absolute;
    top: 20px; left: 24px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.78rem;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .flashcard .content {
    margin-top: 24px;
  }
  .flashcard .prompt-text {
    font-family: var(--serif);
    font-size: 1.4rem;
    line-height: 1.6;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .flashcard .ctx {
    color: var(--ink-soft);
    margin: 12px 0;
    font-style: italic;
    font-family: var(--serif);
  }
  .flashcard .answer {
    font-family: var(--serif);
    font-size: 1.25rem;
    line-height: 1.6;
    color: var(--ink);
    padding: 16px;
    background: var(--paper-tint);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    margin: 16px 0;
  }
  .flashcard .extras {
    font-size: 0.92rem;
    color: var(--ink-soft);
    line-height: 1.7;
    margin-top: 12px;
  }
  .flashcard .extras p { margin: 6px 0; }
  .flashcard .lang-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.7rem;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 6px;
  }

  .flashcard-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .flashcard-actions .btn {
    min-width: 140px;
    justify-content: center;
  }
  .btn-flip {
    background: var(--accent);
    color: white;
  }
  .btn-flip:hover { background: var(--accent-deep); }
  .btn-known {
    background: white;
    color: var(--accent-deep);
    border: 1px solid var(--accent);
  }
  .btn-known:hover { background: var(--accent-soft); }
  .btn-unknown {
    background: white;
    color: var(--warn);
    border: 1px solid var(--warn);
  }
  .btn-unknown:hover { background: var(--warn-soft); }

  .session-end {
    text-align: center;
    padding: 60px 32px;
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 16px;
  }
  .session-end h2 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 1.8rem;
    margin: 0 0 12px;
  }
  .session-stats {
    display: flex;
    gap: 32px;
    justify-content: center;
    margin: 28px 0;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: var(--serif);
    font-size: 2.4rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
  }
  .stat-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  /* ============ BANNER ============ */
  .banner {
    background: var(--warn-soft);
    border: 1px solid var(--warn);
    color: #843D26;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 0.88rem;
    display: none;
  }
  .banner.show { display: block; }
  .banner strong { font-family: var(--serif); }

  /* ============ FOOTER ============ */
  footer {
    text-align: center;
    padding: 32px 0 40px;
    color: var(--ink-muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.85rem;
    border-top: 1px solid var(--line-soft);
    margin-top: 48px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 640px) {
    .wrap { padding: 0 16px; }
    header.top { padding: 32px 0 20px; }
    main { padding: 24px 0 60px; }
    .field-row { grid-template-columns: 1fr; }
    .flashcard { padding: 32px 24px; }
    .flashcard .prompt-text { font-size: 1.15rem; }
    .session-stats { gap: 20px; }
    .modal-head, .modal-body, .modal-foot { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<div class="wrap">

<header class="top">
  <div class="row">
    <div class="brand">
      <h1>寫作範本銀行 <em>· bank</em></h1>
      <div class="sub">For translation, English essay, and 國文素材.</div>
      <div class="date" id="today-date"></div>
    </div>
    <div class="meta-actions">
      <button class="icon-btn" id="btn-export" title="匯出 JSON 備份">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
      </button>
      <button class="icon-btn" id="btn-import" title="匯入 JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14"/></svg>
      </button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="translations">翻譯句型 <span class="num" id="count-translations">0</span></button>
    <button class="tab" data-tab="essays">英文作文 <span class="num" id="count-essays">0</span></button>

<script>
/* =============================================
   STORAGE LAYER  (localStorage with in-memory fallback)
   ============================================= */
const STORAGE_KEY = 'writing-template-bank-v1';
let storageOk = true;
const memoryStore = {};

function tryStorage() {
  try {
    const k = '__test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (e) { return false; }
}
storageOk = tryStorage();
if (!storageOk) {
  document.getElementById('storage-banner').classList.add('show');
}

function saveData(data) {
  const json = JSON.stringify(data);
  if (storageOk) {
    try { localStorage.setItem(STORAGE_KEY, json); }
    catch (e) { memoryStore[STORAGE_KEY] = json; storageOk = false; document.getElementById('storage-banner').classList.add('show'); }
  } else {
    memoryStore[STORAGE_KEY] = json;
  }
  updateLastSaved();
}

function loadData() {
  let json = null;
  if (storageOk) {
    try { json = localStorage.getItem(STORAGE_KEY); } catch (e) { json = null; }
  }
  if (!json) json = memoryStore[STORAGE_KEY] || null;
  if (!json) return null;
  try { return JSON.parse(json); } catch (e) { return null; }
}

function updateLastSaved() {
  const el = document.getElementById('last-saved');
  if (el) el.textContent = '最後更新 · ' + new Date().toLocaleString('zh-TW');
}

/* =============================================
   SEED DATA  (only used when bank is empty)
   ============================================= */
const SEED = {
  translations: [
    { id: uid(), pattern: 'With the rapid development of X, ...', meaning: '隨著 X 的快速發展,...', exampleZh: '隨著科技的快速發展,人類的生活方式產生了根本性的轉變。', exampleEn: 'With the rapid development of technology, the way humans live has undergone a fundamental transformation.', tags: ['萬用開頭','發展'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), pattern: 'A growing number of people ...', meaning: '越來越多人...', exampleZh: '越來越多人開始重視心理健康。', exampleEn: 'A growing number of people are beginning to take mental health seriously.', tags: ['趨勢'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), pattern: 'Studies have shown that ...', meaning: '研究指出...', exampleZh: '研究指出,長期睡眠不足會顯著影響認知功能。', exampleEn: 'Studies have shown that chronic sleep deprivation significantly impairs cognitive function.', tags: ['引用研究','學術'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), pattern: 'It is worth noting that ...', meaning: '值得注意的是...', exampleZh: '值得注意的是,這項研究的樣本數相對有限。', exampleEn: 'It is worth noting that the sample size of this study is relatively limited.', tags: ['提醒','保留'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), pattern: 'Not only ... but also ... / X, coupled with Y', meaning: '不僅...而且...', exampleZh: '這種方法不僅有效,而且成本低廉。', exampleEn: 'This method is not only effective but also cost-efficient.', tags: ['並列'], difficulty: 'B', createdAt: Date.now() }
  ],
  essays: [
    { id: uid(), type: 'opening', content: 'In recent years, X has become a topic of heated debate, with opinions sharply divided over its true impact on Y.', usage: '爭議型開頭 — 適合討論社會議題、科技倫理。', example: '', tags: ['爭議','現象'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: 'body', content: 'A case in point is X. / This is best illustrated by ...', usage: '舉例段落起手 — 接具體例子。', example: 'A case in point is the rise of remote work during the pandemic, which fundamentally reshaped how organizations operate.', tags: ['舉例'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), type: 'transition', content: 'Admittedly, X. However, this view overlooks Y.', usage: '讓步轉折 — 先承認對方再反駁,顯得有層次。', example: '', tags: ['讓步','反駁'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: 'conclusion', content: 'Given the points discussed above, it becomes clear that X. Looking ahead, ...', usage: '收尾 + 展望 — 不要只總結,加一句展望會比較有力量。', example: '', tags: ['結尾','展望'], difficulty: 'B', createdAt: Date.now() }
  ],
  chinese: [
    { id: uid(), type: '破題', content: '「__引言__」,__作者__如是說。__接續闡釋,點出文章主旨__', source: '引名言型模板', usage: '適用大部分論說題,引用要扣題,避免硬套。', tags: ['模板','引言型'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: '名句', content: '不畏浮雲遮望眼,自緣身在最高層。', source: '王安石 〈登飛來峰〉', usage: '可用於格局/視野/堅持類主題。', tags: ['視野','格局','堅持'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: '人物事件', content: '司馬遷遭受宮刑,仍忍辱負重完成《史記》,以「究天人之際,通古今之變,成一家之言」為志。', source: '《史記》', usage: '挫折/堅持/使命/書寫類主題皆可用。', tags: ['堅持','挫折','使命'], difficulty: 'B', createdAt: Date.now() }
  ]
};

/* =============================================
   STATE & HELPERS
   ============================================= */
let state = loadData() || SEED;
// Ensure all required arrays exist (in case of partial data)
['translations','essays','chinese'].forEach(k => { if (!state[k]) state[k] = []; });

function uid() { return 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function persist() { saveData(state); refreshCounts(); }

function refreshCounts() {
  document.getElementById('count-translations').textContent = state.translations.length;
  document.getElementById('count-essays').textContent = state.essays.length;
  document.getElementById('count-chinese').textContent = state.chinese.length;
}
refreshCounts();
updateLastSaved();

// Today date in elegant format
const d = new Date();
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('today-date').textContent = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

/* =============================================
   FILTERS  (per-bank state)
   ============================================= */
const filterState = {
  translations: { search: '', difficulty: null },
  essays: { search: '', difficulty: null, type: null },
  chinese: { search: '', difficulty: null, type: null }
};

document.querySelectorAll('input[data-search]').forEach(input => {
  input.addEventListener('input', e => {
    const bank = e.target.dataset.search;
    filterState[bank].search = e.target.value.toLowerCase().trim();
    renderBank(bank);
  });
});

document.querySelectorAll('[data-filters]').forEach(group => {
  const bank = group.dataset.filters;
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.dataset.difficulty) {
        const v = chip.dataset.difficulty;
        if (filterState[bank].difficulty === v) {
          filterState[bank].difficulty = null;
          chip.classList.remove('active');
        } else {
          filterState[bank].difficulty = v;
          group.querySelectorAll('.chip[data-difficulty]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
      } else if (chip.dataset.type) {
        const v = chip.dataset.type;
        if (filterState[bank].type === v) {
          filterState[bank].type = null;
          chip.classList.remove('active');
        } else {
          filterState[bank].type = v;
          group.querySelectorAll('.chip[data-type]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
      }
      renderBank(bank);
    });
  });
});

/* =============================================
   RENDER BANKS
   ============================================= */
function filterItems(bank) {
  const f = filterState[bank];
  return state[bank].filter(item => {
    if (f.difficulty && item.difficulty !== f.difficulty) return false;
    if (f.type && item.type !== f.type) return false;
    if (f.search) {
      const haystack = JSON.stringify(item).toLowerCase();
      if (!haystack.includes(f.search)) return false;
    }
    return true;
  });
}

function renderBank(bank) {
  const list = document.getElementById('list-' + bank);
  const items = filterItems(bank);
  if (items.length === 0) {
    const isEmpty = state[bank].length === 0;
    list.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 4h16v16H4z M4 9h16 M9 4v16"/></svg>
        <h3>${isEmpty ? '銀行還是空的' : '沒有符合的項目'}</h3>
        <p>${isEmpty ? '從刷題裡抓素材,慢慢養大。' : '試試清除篩選或調整搜尋。'}</p>
      </div>`;
    return;
  }
  list.innerHTML = items.map(item => renderCard(bank, item)).join('');
  list.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openModal(bank, btn.dataset.edit);
    });
  });
  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.delete;
      if (confirm('確定刪除這筆?')) {
        state[bank] = state[bank].filter(x => x.id !== id);
        persist();
        renderBank(bank);
      }
    });
  });
}

function renderCard(bank, item) {
  const diff = item.difficulty || 'B';
  const diffLabel = { A: '穩', B: '不穩', C: '弱' }[diff];
  const tags = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

  let body = '';
  if (bank === 'translations') {
    body = `
      <div class="card-meaning">${escapeHtml(item.meaning || '')}</div>
      ${item.exampleZh || item.exampleEn ? `
        <div class="card-example">
          ${item.exampleZh ? `<span class="lang-label">中</span><p>${escapeHtml(item.exampleZh)}</p>` : ''}
          ${item.exampleEn ? `<span class="lang-label">en</span><p>${escapeHtml(item.exampleEn)}</p>` : ''}
        </div>` : ''}
    `;
  } else if (bank === 'essays') {
    const typeLabel = { opening: '開頭', body: '段落', transition: '轉折/讓步', conclusion: '結尾' }[item.type] || '';
    body = `
      <div class="card-meaning">${escapeHtml(typeLabel)}${item.usage ? ' · ' + escapeHtml(item.usage) : ''}</div>
      ${item.example ? `<div class="card-example"><p>${escapeHtml(item.example)}</p></div>` : ''}
    `;
  } else if (bank === 'chinese') {
    body = `
      <div class="card-meaning">${escapeHtml(item.type)}${item.source ? ' · ' + escapeHtml(item.source) : ''}</div>
      ${item.usage ? `<div class="card-example"><p>${escapeHtml(item.usage)}</p></div>` : ''}
    `;
  }

  const titleField = bank === 'translations' ? 'pattern' : 'content';
  return `
    <div class="card">
      <div class="card-head">
        <h3 class="card-title">${escapeHtml(item[titleField] || '')}</h3>
        <div class="card-actions">
          <button data-edit="${item.id}" title="編輯">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20h9 M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button data-delete="${item.id}" class="danger" title="刪除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18 M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2 M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>
      ${body}
      <div class="card-foot">
        <div class="tag-list">${tags}</div>
        <div class="difficulty-dot"><span class="dot dot-${diff}"></span>${diff} · ${diffLabel}</div>
      </div>
    </div>`;
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* =============================================
   TABS
   ============================================= */
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'practice') resetPracticeUI();
});

/* =============================================
   MODAL  (add/edit)
   ============================================= */
const modalOverlay = document.getElementById('modal-overlay');
const modalBody = document.getElementById('modal-body');
const modalTitle = document.getElementById('modal-title');
const modalSaveBtn = document.getElementById('modal-save');
let editingContext = null; // { bank, id }

document.querySelectorAll('[data-add]').forEach(btn => {
  btn.addEventListener('click', () => openModal(btn.dataset.add, null));
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

function openModal(bank, id) {
  editingContext = { bank, id };
  const item = id ? state[bank].find(x => x.id === id) : null;
  modalTitle.textContent = (id ? '編輯' : '新增') + ' · ' + bankLabel(bank);
  modalBody.innerHTML = renderForm(bank, item);
  attachDifficultyPicker();
  modalOverlay.classList.add('show');
  setTimeout(() => modalBody.querySelector('input,textarea')?.focus(), 50);
}

function closeModal() {
  modalOverlay.classList.remove('show');
  editingContext = null;
}

function bankLabel(bank) {
  return { translations: '翻譯句型', essays: '英文作文', chinese: '國文素材' }[bank];
}

function renderForm(bank, item) {
  item = item || { difficulty: 'B', tags: [] };
  const diff = item.difficulty || 'B';
  const diffPicker = `
    <div class="diff-picker">
      <button type="button" class="diff-opt A ${diff==='A'?'selected':''}" data-diff="A"><span class="dot dot-A"></span>A · 穩</button>
      <button type="button" class="diff-opt B ${diff==='B'?'selected':''}" data-diff="B"><span class="dot dot-B"></span>B · 不穩</button>
      <button type="button" class="diff-opt C ${diff==='C'?'selected':''}" data-diff="C"><span class="dot dot-C"></span>C · 弱</button>
    </div>`;
  const tagsVal = (item.tags || []).join(', ');

  if (bank === 'translations') {
    return `
      <div class="field">
        <label>句型(英文)</label>
        <input id="f-pattern" type="text" placeholder="e.g. With the rapid development of X, ..." value="${escapeHtml(item.pattern || '')}">
        <div class="field-hint">用 X、Y 標出可替換的位置。</div>
      </div>
      <div class="field">
        <label>中文意思</label>
        <input id="f-meaning" type="text" placeholder="e.g. 隨著 X 的快速發展..." value="${escapeHtml(item.meaning || '')}">
      </div>
      <div class="field-row">
        <div class="field">
          <label>例句(中文)</label>
          <textarea id="f-exampleZh" placeholder="一個你寫過的具體中文例子">${escapeHtml(item.exampleZh || '')}</textarea>
        </div>
        <div class="field">
          <label>例句(英文)</label>
          <textarea id="f-exampleEn" placeholder="對應的英文翻譯">${escapeHtml(item.exampleEn || '')}</textarea>
        </div>
      </div>
      <div class="field">
        <label>標籤(以逗號分隔)</label>
        <input id="f-tags" type="text" placeholder="e.g. 萬用開頭, 趨勢, 學術" value="${escapeHtml(tagsVal)}">
      </div>
      <div class="field">
        <label>難度</label>
        ${diffPicker}
      </div>
    `;
  }

  if (bank === 'essays') {
    const typeOpts = [['opening','開頭'],['body','段落'],['transition','轉折/讓步'],['conclusion','結尾']];
    return `
      <div class="field">
        <label>類型</label>
        <select id="f-type">
          ${typeOpts.map(([v,l]) => `<option value="${v}" ${item.type===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>模板/句型</label>
        <textarea id="f-content" placeholder="e.g. Admittedly, X. However, this view overlooks Y.">${escapeHtml(item.content || '')}</textarea>
      </div>
      <div class="field">
        <label>使用情境/說明</label>
        <textarea id="f-usage" placeholder="什麼時候適合用?要注意什麼?">${escapeHtml(item.usage || '')}</textarea>
      </div>
      <div class="field">
        <label>具體應用例(選填)</label>
        <textarea id="f-example" placeholder="一段你實際寫過的例子">${escapeHtml(item.example || '')}</textarea>
      </div>
      <div class="field">
        <label>標籤(以逗號分隔)</label>
        <input id="f-tags" type="text" placeholder="e.g. 爭議, 舉例, 結尾" value="${escapeHtml(tagsVal)}">
      </div>
      <div class="field">
        <label>難度</label>
        ${diffPicker}
      </div>
    `;
  }

  // chinese
  const typeOpts = [['破題','破題'],['名句','名句'],['人物事件','人物/事件'],['結語','結語']];
  return `
    <div class="field">
      <label>類型</label>
      <select id="f-type">
        ${typeOpts.map(([v,l]) => `<option value="${v}" ${item.type===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>內容</label>
      <textarea id="f-content" placeholder="名句、模板、或人物事件的描述">${escapeHtml(item.content || '')}</textarea>
    </div>
    <div class="field">
      <label>出處/作者(選填)</label>
      <input id="f-source" type="text" placeholder="e.g. 王安石〈登飛來峰〉" value="${escapeHtml(item.source || '')}">
    </div>
    <div class="field">
      <label>使用情境/說明</label>
      <textarea id="f-usage" placeholder="哪些主題適合用?">${escapeHtml(item.usage || '')}</textarea>
    </div>
    <div class="field">
      <label>標籤/主題(以逗號分隔)</label>
      <input id="f-tags" type="text" placeholder="e.g. 堅持, 視野, 挫折" value="${escapeHtml(tagsVal)}">
    </div>
    <div class="field">
      <label>難度</label>
      ${diffPicker}
    </div>
  `;
}

function attachDifficultyPicker() {
  const pickerWrap = modalBody.querySelector('.diff-picker');
  if (!pickerWrap) return;
  pickerWrap.addEventListener('click', e => {
    const btn = e.target.closest('.diff-opt');
    if (!btn) return;
    pickerWrap.querySelectorAll('.diff-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
}

modalSaveBtn.addEventListener('click', () => {
  if (!editingContext) return;
  const { bank, id } = editingContext;
  const tags = (modalBody.querySelector('#f-tags')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
  const diffEl = modalBody.querySelector('.diff-opt.selected');
  const difficulty = diffEl ? diffEl.dataset.diff : 'B';

  let payload = { tags, difficulty };
  if (bank === 'translations') {
    payload.pattern = modalBody.querySelector('#f-pattern').value.trim();
    payload.meaning = modalBody.querySelector('#f-meaning').value.trim();
    payload.exampleZh = modalBody.querySelector('#f-exampleZh').value.trim();
    payload.exampleEn = modalBody.querySelector('#f-exampleEn').value.trim();
    if (!payload.pattern) { alert('請填寫句型'); return; }
  } else if (bank === 'essays') {
    payload.type = modalBody.querySelector('#f-type').value;
    payload.content = modalBody.querySelector('#f-content').value.trim();
    payload.usage = modalBody.querySelector('#f-usage').value.trim();
    payload.example = modalBody.querySelector('#f-example').value.trim();
    if (!payload.content) { alert('請填寫模板內容'); return; }
  } else if (bank === 'chinese') {
    payload.type = modalBody.querySelector('#f-type').value;
    payload.content = modalBody.querySelector('#f-content').value.trim();
    payload.source = modalBody.querySelector('#f-source').value.trim();
    payload.usage = modalBody.querySelector('#f-usage').value.trim();
    if (!payload.content) { alert('請填寫內容'); return; }
  }

  if (id) {
    const idx = state[bank].findIndex(x => x.id === id);
    if (idx >= 0) state[bank][idx] = { ...state[bank][idx], ...payload };
  } else {
    state[bank].push({ id: uid(), createdAt: Date.now(), ...payload });
  }
  persist();
  renderBank(bank);
  closeModal();
});

/* =============================================
   EXPORT / IMPORT
   ============================================= */
document.getElementById('btn-export').addEventListener('click', () => {
  const data = JSON.stringify({ version: '1.0', exportedAt: new Date().toISOString(), ...state }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `template-bank-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.translations && !imported.essays && !imported.chinese) {
        alert('檔案格式不正確'); return;
      }
      if (!confirm('要匯入並覆蓋現有資料嗎?(建議先匯出備份)')) return;
      state = {
        translations: imported.translations || [],
        essays: imported.essays || [],
        chinese: imported.chinese || []
      };
      persist();
      renderBank('translations');
      renderBank('essays');
      renderBank('chinese');
      alert('匯入完成');
    } catch (err) {
      alert('匯入失敗:' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* =============================================
   PRACTICE MODE
   ============================================= */
let session = null; // { items, idx, known, unknown, flipped }

document.getElementById('start-practice').addEventListener('click', startPractice);
document.getElementById('end-practice').addEventListener('click', endPractice);
document.getElementById('restart-practice').addEventListener('click', resetPracticeUI);

function resetPracticeUI() {
  session = null;
  document.getElementById('practice-setup').style.display = '';
  document.getElementById('practice-active').style.display = 'none';
  document.getElementById('practice-end').style.display = 'none';
}

function startPractice() {
  const bankSel = document.getElementById('practice-bank').value;
  const diffSel = document.getElementById('practice-difficulty').value;
  const countSel = document.getElementById('practice-count').value;

  let pool = [];
  if (bankSel === 'all') {
    state.translations.forEach(x => pool.push({ bank: 'translations', item: x }));
    state.essays.forEach(x => pool.push({ bank: 'essays', item: x }));
    state.chinese.forEach(x => pool.push({ bank: 'chinese', item: x }));
  } else {
    state[bankSel].forEach(x => pool.push({ bank: bankSel, item: x }));
  }

  if (diffSel === 'BC') pool = pool.filter(p => p.item.difficulty === 'B' || p.item.difficulty === 'C');
  else if (diffSel === 'C') pool = pool.filter(p => p.item.difficulty === 'C');
  else if (diffSel === 'A') pool = pool.filter(p => p.item.difficulty === 'A');

  if (pool.length === 0) {
    alert('沒有符合條件的題目。試試調整篩選或先去新增資料。');
    return;
  }

  // shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (countSel !== 'all') pool = pool.slice(0, Number(countSel));

  session = { items: pool, idx: 0, known: 0, unknown: 0, flipped: false };
  document.getElementById('practice-setup').style.display = 'none';
  document.getElementById('practice-active').style.display = '';
  renderFlashcard();
}

function renderFlashcard() {
  const { items, idx, flipped } = session;
  const total = items.length;
  document.getElementById('practice-counter').textContent = `第 ${idx + 1} / ${total} 題`;
  document.getElementById('progress-fill').style.width = `${(idx / total) * 100}%`;

  const { bank, item } = items[idx];
  const flashcard = document.getElementById('flashcard');

  let frontHtml = '', backHtml = '';
  if (bank === 'translations') {
    frontHtml = `
      <div class="face-label">中文 → 英文</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.meaning || '(無中文意思)')}</p>
        ${item.exampleZh ? `<p class="ctx">${escapeHtml(item.exampleZh)}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.pattern)}</div>
        ${item.exampleEn ? `<div class="extras"><span class="lang-label">en</span>${escapeHtml(item.exampleEn)}</div>` : ''}
        ${item.exampleZh ? `<div class="extras"><span class="lang-label">中</span>${escapeHtml(item.exampleZh)}</div>` : ''}
      </div>`;
  } else if (bank === 'essays') {
    const typeLabel = { opening: '開頭', body: '段落', transition: '轉折/讓步', conclusion: '結尾' }[item.type] || '';
    frontHtml = `
      <div class="face-label">英文作文 · ${escapeHtml(typeLabel)}</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.usage || '想想這類型的句型...')}</p>
        ${(item.tags||[]).length ? `<p class="ctx">${item.tags.map(t=>'#'+escapeHtml(t)).join(' ')}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.content)}</div>
        ${item.example ? `<div class="extras"><strong>例:</strong> ${escapeHtml(item.example)}</div>` : ''}
      </div>`;
  } else {
    frontHtml = `
      <div class="face-label">國文素材 · ${escapeHtml(item.type)}</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.usage || (item.tags||[]).join(' / ') || '回想這個素材...')}</p>
        ${item.source ? `<p class="ctx">${escapeHtml(item.source)}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.content)}</div>
        ${item.source ? `<div class="extras"><strong>出處:</strong> ${escapeHtml(item.source)}</div>` : ''}
        ${item.usage ? `<div class="extras"><strong>用途:</strong> ${escapeHtml(item.usage)}</div>` : ''}
      </div>`;
  }

  flashcard.innerHTML = flipped ? backHtml : frontHtml;
  const actions = document.getElementById('flashcard-actions');
  if (!flipped) {
    actions.innerHTML = `<button class="btn btn-flip" id="btn-flip">翻面看答案</button>`;
    document.getElementById('btn-flip').addEventListener('click', () => { session.flipped = true; renderFlashcard(); });
  } else {
    actions.innerHTML = `
      <button class="btn btn-known" id="btn-known">會了 →</button>
      <button class="btn btn-unknown" id="btn-unknown">需加強 →</button>
    `;
    document.getElementById('btn-known').addEventListener('click', () => mark('known'));
    document.getElementById('btn-unknown').addEventListener('click', () => mark('unknown'));
  }
}

function mark(result) {
  const cur = session.items[session.idx];
  if (result === 'known') {
    session.known++;
    // promote difficulty: C→B, B→A (don't auto-promote A)
    if (cur.item.difficulty === 'C') cur.item.difficulty = 'B';
    else if (cur.item.difficulty === 'B') cur.item.difficulty = 'A';
  } else {
    session.unknown++;
    // demote: A→B, B→C, C stays C
    if (cur.item.difficulty === 'A') cur.item.difficulty = 'B';
    else if (cur.item.difficulty === 'B') cur.item.difficulty = 'C';
  }
  cur.item.lastReviewed = Date.now();
  cur.item.reviewCount = (cur.item.reviewCount || 0) + 1;
  // update in state
  const idx = state[cur.bank].findIndex(x => x.id === cur.item.id);
  if (idx >= 0) state[cur.bank][idx] = cur.item;

  session.idx++;
  session.flipped = false;
  if (session.idx >= session.items.length) {
    persist();
    renderBank('translations');
    renderBank('essays');
    renderBank('chinese');
    showSessionEnd();
  } else {
    renderFlashcard();
  }
}

function showSessionEnd() {
  document.getElementById('practice-active').style.display = 'none';
  document.getElementById('practice-end').style.display = '';
  document.getElementById('stat-known').textContent = session.known;
  document.getElementById('stat-unknown').textContent = session.unknown;
  document.getElementById('stat-total').textContent = session.items.length;
}

function endPractice() {
  if (!session) return resetPracticeUI();
  if (session.idx > 0 && confirm('要結束這輪嗎?目前的進度會儲存。')) {
    persist();
    showSessionEnd();
  } else if (session.idx === 0) {
    resetPracticeUI();
  }
}

/* =============================================
   INITIAL RENDER
   ============================================= */
renderBank('translations');
renderBank('essays');
renderBank('chinese');

// First-time save (in case using seed data)
if (!loadData()) persist();

</script>
