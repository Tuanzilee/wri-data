<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Bank · 寫作範本銀行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================
     DESIGN TOKENS — cool monochrome, swiss-ish
     ============================================ */
  :root {
    /* Surfaces */
    --bg:           #FAFAFA;
    --bg-2:         #F4F4F5;
    --surface:      #FFFFFF;
    --surface-2:    #FAFAFA;
    --hover:        #F4F4F5;

    /* Lines */
    --border:       #E4E4E7;
    --border-soft:  #F0F0F1;
    --border-strong:#D4D4D8;

    /* Text */
    --fg:           #09090B;
    --fg-2:         #3F3F46;
    --fg-3:         #71717A;
    --fg-4:         #A1A1AA;
    --fg-5:         #D4D4D8;

    /* Difficulty (darker = needs more attention) */
    --diff-A:       #D4D4D8;
    --diff-B:       #71717A;
    --diff-C:       #09090B;

    /* Type */
    --sans:         "Geist", "Noto Sans TC", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono:         "Geist Mono", ui-monospace, SFMono-Regular, "JetBrains Mono", monospace;

    /* Geometry */
    --r:            6px;
    --r-lg:         10px;

    /* Motion */
    --easing:       cubic-bezier(.16, 1, .3, 1);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { font-size: 15px; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-feature-settings: "ss01", "cv11";
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: var(--fg); color: var(--bg); }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input, textarea, select { font-family: inherit; color: inherit; }
  input:focus, textarea:focus, select:focus { outline: none; }

  /* ============ LAYOUT ============ */
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 640px) { .wrap { padding: 0 20px; } }

  /* ============ HEADER ============ */
  header.top { padding: 56px 0 0; }
  header.top .row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .brand .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-4);
    margin-bottom: 12px;
  }
  .brand h1 {
    font-size: clamp(1.75rem, 3vw, 2.25rem);
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0;
    line-height: 1.1;
    color: var(--fg);
  }
  .brand .sub {
    color: var(--fg-3);
    font-size: 0.95rem;
    margin-top: 8px;
    max-width: 480px;
  }

  .meta-actions { display: flex; gap: 4px; align-items: center; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--r);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-3);
    transition: all .15s var(--easing);
  }
  .icon-btn:hover { background: var(--hover); color: var(--fg); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ============ TABS ============ */
  nav.tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -8px;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-size: 0.875rem;
    font-weight: 500;
    padding: 10px 16px 14px;
    color: var(--fg-3);
    border-bottom: 1.5px solid transparent;
    margin-bottom: -1px;
    transition: color .15s var(--easing), border-color .15s var(--easing);
    white-space: nowrap;
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
  }
  .tab:hover { color: var(--fg-2); }
  .tab.active { color: var(--fg); border-bottom-color: var(--fg); }
  .tab .num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--fg-4);
  }
  .tab.active .num { color: var(--fg-3); }

  /* ============ MAIN ============ */
  main { padding: 32px 0 80px; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn .2s var(--easing); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ TOOLBAR ============ */
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search { flex: 1; min-width: 220px; position: relative; }
  .search input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    font-size: 0.875rem;
    transition: border-color .15s var(--easing);
  }
  .search input:focus { border-color: var(--fg); }
  .search input::placeholder { color: var(--fg-4); }
  .search svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    color: var(--fg-4);
    pointer-events: none;
  }

  /* ============ BUTTONS ============ */
  .btn {
    padding: 7px 14px;
    border-radius: var(--r);
    font-size: 0.875rem;
    font-weight: 500;
    transition: all .15s var(--easing);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--fg);
    color: var(--bg);
  }
  .btn-primary:hover { background: var(--fg-2); }
  .btn-ghost {
    background: var(--surface);
    color: var(--fg-2);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--hover); border-color: var(--border-strong); color: var(--fg); }

  /* ============ FILTERS ============ */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg-4);
    margin-right: 4px;
  }
  .filter-label + .filter-label { margin-left: 8px; }

  .chip {
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.78rem;
    color: var(--fg-3);
    transition: all .12s var(--easing);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1.4;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--fg-2); }
  .chip.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .chip .pip { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .chip .pip-A { background: var(--diff-A); }
  .chip .pip-B { background: var(--diff-B); }
  .chip .pip-C { background: var(--diff-C); }
  .chip.active .pip { background: var(--bg); }

  /* ============ CARDS ============ */
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-lg);
    padding: 18px 20px;
    transition: border-color .15s var(--easing);
    position: relative;
  }
  .card:hover { border-color: var(--border-strong); }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.5;
    margin: 0;
    flex: 1;
    color: var(--fg);
    letter-spacing: -0.005em;
  }
  .card-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity .15s var(--easing);
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    width: 26px; height: 26px;
    border-radius: var(--r);
    color: var(--fg-4);
    display: flex; align-items: center; justify-content: center;
    transition: all .12s var(--easing);
  }
  .card-actions button:hover { background: var(--hover); color: var(--fg); }
  .card-actions button.danger:hover { color: #DC2626; }
  .card-actions svg { width: 13px; height: 13px; }

  .card-meaning {
    font-size: 0.83rem;
    color: var(--fg-3);
    margin: 2px 0 10px;
  }
  .card-example {
    font-size: 0.83rem;
    color: var(--fg-2);
    line-height: 1.65;
    padding: 10px 12px;
    background: var(--bg-2);
    border-radius: var(--r);
    margin: 8px 0 10px;
  }
  .card-example .lang-label {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--fg-4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 8px;
    display: inline-block;
    min-width: 18px;
  }
  .card-example p { margin: 0 0 4px; display: flex; align-items: baseline; }
  .card-example p > span:not(.lang-label) { flex: 1; }
  .card-example p:last-child { margin: 0; }

  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 0.7rem;
    padding: 2px 7px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg-3);
    font-family: var(--mono);
    letter-spacing: 0.01em;
  }

  .difficulty-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-A { background: var(--diff-A); }
  .dot-B { background: var(--diff-B); }
  .dot-C { background: var(--diff-C); }

  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--fg-4);
  }
  .empty svg { width: 32px; height: 32px; opacity: 0.4; margin-bottom: 16px; }
  .empty h3 {
    font-weight: 500;
    font-size: 0.95rem;
    margin: 0 0 4px;
    color: var(--fg-3);
  }
  .empty p { font-size: 0.85rem; margin: 0; color: var(--fg-4); }

  /* ============ MODAL ============ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(9, 9, 11, 0.32);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    animation: overlayIn .15s var(--easing);
  }
  .modal-overlay.show { display: flex; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: 12px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 16px 48px rgba(0,0,0,.08);
    border: 1px solid var(--border);
    animation: modalIn .2s var(--easing);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-head h2 {
    font-weight: 500;
    margin: 0;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }
  .modal-body { padding: 20px 24px; }
  .modal-foot {
    padding: 14px 24px 20px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-3);
    margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    font-size: 0.875rem;
    transition: border-color .15s var(--easing);
    font-family: var(--sans);
    line-height: 1.55;
    color: var(--fg);
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--fg-4); }
  .field textarea { resize: vertical; min-height: 64px; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--fg); }
  .field-hint {
    font-size: 0.75rem;
    color: var(--fg-4);
    margin-top: 4px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .diff-picker { display: flex; gap: 6px; }
  .diff-opt {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r);
    background: var(--surface);
    text-align: center;
    transition: all .12s var(--easing);
    font-size: 0.82rem;
    color: var(--fg-3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .diff-opt:hover { border-color: var(--border-strong); color: var(--fg-2); }
  .diff-opt.selected { border-color: var(--fg); color: var(--fg); background: var(--bg-2); }

  /* ============ PRACTICE ============ */
  .practice-setup {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-lg);
    padding: 40px 32px;
    max-width: 440px;
    margin: 24px auto;
  }
  .practice-setup .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-4);
    text-align: center;
    margin-bottom: 8px;
  }
  .practice-setup h2 {
    text-align: center;
    font-weight: 500;
    margin: 0 0 8px;
    font-size: 1.25rem;
    letter-spacing: -0.01em;
  }
  .practice-setup .lead {
    color: var(--fg-3);
    font-size: 0.875rem;
    text-align: center;
    margin: 0 0 28px;
  }
  .practice-options { display: flex; flex-direction: column; gap: 16px; }
  .practice-options .field { margin: 0; }

  .flashcard-wrap { max-width: 640px; margin: 0 auto; }
  .practice-progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-family: var(--mono);
    color: var(--fg-3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .progress-bar {
    height: 1px;
    background: var(--border);
    overflow: hidden;
    margin: 0 0 32px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--fg);
    transition: width .25s var(--easing);
  }

  .flashcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-lg);
    padding: 40px 36px;
    min-height: 240px;
    position: relative;
  }
  .flashcard .face-label {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--fg-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .flashcard .prompt-text {
    font-size: 1.125rem;
    line-height: 1.55;
    margin: 0 0 12px;
    color: var(--fg);
    font-weight: 400;
    letter-spacing: -0.005em;
  }
  .flashcard .ctx {
    color: var(--fg-3);
    margin: 8px 0 0;
    font-size: 0.875rem;
  }
  .flashcard .answer {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--fg);
    padding: 16px 18px;
    background: var(--bg-2);
    border-radius: var(--r);
    margin: 4px 0 12px;
    font-weight: 400;
  }
  .flashcard .extras {
    font-size: 0.85rem;
    color: var(--fg-2);
    line-height: 1.6;
    margin-top: 10px;
  }
  .flashcard .extras p { margin: 4px 0; display: flex; align-items: baseline; gap: 8px; }
  .flashcard .lang-label, .flashcard .extras strong {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    min-width: 28px;
    flex-shrink: 0;
  }

  .flashcard-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .flashcard-actions .btn { min-width: 130px; justify-content: center; }
  .btn-flip { background: var(--fg); color: var(--bg); }
  .btn-flip:hover { background: var(--fg-2); }
  .btn-known {
    background: var(--surface);
    color: var(--fg);
    border: 1px solid var(--fg);
  }
  .btn-known:hover { background: var(--fg); color: var(--bg); }
  .btn-unknown {
    background: var(--surface);
    color: var(--fg-2);
    border: 1px solid var(--border-strong);
  }
  .btn-unknown:hover { background: var(--bg-2); border-color: var(--fg-3); }

  .session-end {
    text-align: center;
    padding: 56px 32px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-lg);
    max-width: 480px;
    margin: 24px auto;
  }
  .session-end .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-4);
    margin-bottom: 8px;
  }
  .session-end h2 {
    font-weight: 500;
    font-size: 1.4rem;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .session-end .lead {
    color: var(--fg-3);
    font-size: 0.875rem;
    margin: 0 0 32px;
  }
  .session-stats {
    display: flex;
    gap: 1px;
    justify-content: center;
    margin: 0 0 32px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 20px 12px;
    background: var(--surface);
  }
  .stat-num {
    font-size: 2rem;
    font-weight: 500;
    color: var(--fg);
    line-height: 1;
    letter-spacing: -0.02em;
    font-feature-settings: "tnum";
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--fg-4);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ============ BANNER ============ */
  .banner {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--fg-2);
    padding: 10px 14px;
    border-radius: var(--r);
    margin-bottom: 24px;
    font-size: 0.825rem;
    display: none;
  }
  .banner.show { display: block; }
  .banner strong { color: var(--fg); font-weight: 500; }

  /* ============ FOOTER ============ */
  footer {
    text-align: center;
    padding: 32px 0 40px;
    color: var(--fg-4);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border-soft);
    margin-top: 64px;
  }
  footer #last-saved { display: block; margin-top: 4px; font-size: 10px; opacity: 0.7; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 640px) {
    header.top { padding: 32px 0 0; }
    main { padding: 24px 0 60px; }
    .field-row { grid-template-columns: 1fr; }
    .flashcard { padding: 32px 24px; min-height: 200px; }
    .flashcard .prompt-text { font-size: 1rem; }
    .practice-setup { padding: 32px 24px; margin: 0 0 24px; }
    .session-end { padding: 40px 24px; margin: 0 0 24px; }
    .session-stats { flex-direction: column; }
    .modal-head, .modal-body, .modal-foot { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>
<body>

<div class="wrap">

<header class="top">
  <div class="row">
    <div class="brand">
      <div class="eyebrow">Template Bank — v1</div>
      <h1>寫作範本銀行</h1>
      <div class="sub">翻譯句型、英文作文模板、國文素材 — 一處集結,日積月累。</div>
    </div>
    <div class="meta-actions">

<script>
(function bootstrap() {
  function showError(prefix, e) {
    try {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#FEE2E2;color:#7F1D1D;padding:12px 16px;font-family:ui-monospace,monospace;font-size:11px;z-index:9999;border-top:2px solid #DC2626;white-space:pre-wrap;line-height:1.4;max-height:40vh;overflow:auto;';
      d.textContent = '[' + prefix + '] ' + (e && e.message ? e.message : String(e)) + (e && e.stack ? '\n' + e.stack.split('\n').slice(0,4).join('\n') : '');
      document.body.appendChild(d);
    } catch (_) {}
  }
  
  function run() {
    try {

/* =============================================
   STORAGE LAYER  (dynamic detection — works on
   GitHub Pages w/ localStorage and in sandboxed
   iframes w/ in-memory fallback)
   ============================================= */
const STORAGE_KEY = 'writing-template-bank-v1';
const memoryStore = {};
let _ls = null;

// Probe localStorage via dynamic access, never crash on sandbox
try {
  const w = (typeof window !== 'undefined') ? window : null;
  if (w) {
    const ls = w['localStorage'];
    if (ls && typeof ls.setItem === 'function') {
      const probe = '__wtb_probe_' + Date.now();
      ls.setItem(probe, '1');
      if (ls.getItem(probe) === '1') {
        ls.removeItem(probe);
        _ls = ls;
      }
    }
  }
} catch (e) {
  _ls = null;
}
const storageOk = _ls !== null;

function saveData(data) {
  const json = JSON.stringify(data);
  if (_ls) {
    try { _ls.setItem(STORAGE_KEY, json); }
    catch (e) { memoryStore[STORAGE_KEY] = json; }
  } else {
    memoryStore[STORAGE_KEY] = json;
  }
  updateLastSaved();
}

function loadData() {
  let json = null;
  if (_ls) {
    try { json = _ls.getItem(STORAGE_KEY); } catch (e) { json = null; }
  }
  if (!json) json = memoryStore[STORAGE_KEY] || null;
  if (!json) return null;
  try { return JSON.parse(json); } catch (e) { return null; }
}

// Show banner after DOM is ready (deferred so init doesn't fail)
if (!storageOk) {
  setTimeout(() => {
    try {
      const banner = document.getElementById('storage-banner');
      if (banner) banner.classList.add('show');
    } catch (e) {}
  }, 0);
}

function updateLastSaved() {
  const el = document.getElementById('last-saved');
  if (el) el.textContent = '最後更新 · ' + new Date().toLocaleString('zh-TW');
}

function uid() { return 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

/* =============================================
   SEED DATA  (only used when bank is empty)
   ============================================= */
const SEED = {
  translations: [
    { id: uid(), pattern: 'With the rapid development of X, ...', meaning: '隨著 X 的快速發展,...', exampleZh: '隨著科技的快速發展,人類的生活方式產生了根本性的轉變。', exampleEn: 'With the rapid development of technology, the way humans live has undergone a fundamental transformation.', tags: ['萬用開頭','發展'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), pattern: 'A growing number of people ...', meaning: '越來越多人...', exampleZh: '越來越多人開始重視心理健康。', exampleEn: 'A growing number of people are beginning to take mental health seriously.', tags: ['趨勢'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), pattern: 'Studies have shown that ...', meaning: '研究指出...', exampleZh: '研究指出,長期睡眠不足會顯著影響認知功能。', exampleEn: 'Studies have shown that chronic sleep deprivation significantly impairs cognitive function.', tags: ['引用研究','學術'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), pattern: 'It is worth noting that ...', meaning: '值得注意的是...', exampleZh: '值得注意的是,這項研究的樣本數相對有限。', exampleEn: 'It is worth noting that the sample size of this study is relatively limited.', tags: ['提醒','保留'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), pattern: 'Not only ... but also ... / X, coupled with Y', meaning: '不僅...而且...', exampleZh: '這種方法不僅有效,而且成本低廉。', exampleEn: 'This method is not only effective but also cost-efficient.', tags: ['並列'], difficulty: 'B', createdAt: Date.now() }
  ],
  essays: [
    { id: uid(), type: 'opening', content: 'In recent years, X has become a topic of heated debate, with opinions sharply divided over its true impact on Y.', usage: '爭議型開頭 — 適合討論社會議題、科技倫理。', example: '', tags: ['爭議','現象'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: 'body', content: 'A case in point is X. / This is best illustrated by ...', usage: '舉例段落起手 — 接具體例子。', example: 'A case in point is the rise of remote work during the pandemic, which fundamentally reshaped how organizations operate.', tags: ['舉例'], difficulty: 'A', createdAt: Date.now() },
    { id: uid(), type: 'transition', content: 'Admittedly, X. However, this view overlooks Y.', usage: '讓步轉折 — 先承認對方再反駁,顯得有層次。', example: '', tags: ['讓步','反駁'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: 'conclusion', content: 'Given the points discussed above, it becomes clear that X. Looking ahead, ...', usage: '收尾 + 展望 — 不要只總結,加一句展望會比較有力量。', example: '', tags: ['結尾','展望'], difficulty: 'B', createdAt: Date.now() }
  ],
  chinese: [
    { id: uid(), type: '破題', content: '「__引言__」,__作者__如是說。__接續闡釋,點出文章主旨__', source: '引名言型模板', usage: '適用大部分論說題,引用要扣題,避免硬套。', tags: ['模板','引言型'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: '名句', content: '不畏浮雲遮望眼,自緣身在最高層。', source: '王安石 〈登飛來峰〉', usage: '可用於格局/視野/堅持類主題。', tags: ['視野','格局','堅持'], difficulty: 'B', createdAt: Date.now() },
    { id: uid(), type: '人物事件', content: '司馬遷遭受宮刑,仍忍辱負重完成《史記》,以「究天人之際,通古今之變,成一家之言」為志。', source: '《史記》', usage: '挫折/堅持/使命/書寫類主題皆可用。', tags: ['堅持','挫折','使命'], difficulty: 'B', createdAt: Date.now() }
  ]
};

/* =============================================
   STATE & HELPERS
   ============================================= */
let state = loadData() || SEED;
// Ensure all required arrays exist (in case of partial data)
['translations','essays','chinese'].forEach(k => { if (!state[k]) state[k] = []; });

function uid_unused_legacy() { return ''; } // (uid moved above SEED to fix init order)
function persist() { saveData(state); refreshCounts(); }

function refreshCounts() {
  document.getElementById('count-translations').textContent = state.translations.length;
  document.getElementById('count-essays').textContent = state.essays.length;
  document.getElementById('count-chinese').textContent = state.chinese.length;
}
refreshCounts();
updateLastSaved();

/* =============================================
   FILTERS  (per-bank state)
   ============================================= */
const filterState = {
  translations: { search: '', difficulty: null },
  essays: { search: '', difficulty: null, type: null },
  chinese: { search: '', difficulty: null, type: null }
};

document.querySelectorAll('input[data-search]').forEach(input => {
  input.addEventListener('input', e => {
    const bank = e.target.dataset.search;
    filterState[bank].search = e.target.value.toLowerCase().trim();
    renderBank(bank);
  });
});

document.querySelectorAll('[data-filters]').forEach(group => {
  const bank = group.dataset.filters;
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.dataset.difficulty) {
        const v = chip.dataset.difficulty;
        if (filterState[bank].difficulty === v) {
          filterState[bank].difficulty = null;
          chip.classList.remove('active');
        } else {
          filterState[bank].difficulty = v;
          group.querySelectorAll('.chip[data-difficulty]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
      } else if (chip.dataset.type) {
        const v = chip.dataset.type;
        if (filterState[bank].type === v) {
          filterState[bank].type = null;
          chip.classList.remove('active');
        } else {
          filterState[bank].type = v;
          group.querySelectorAll('.chip[data-type]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        }
      }
      renderBank(bank);
    });
  });
});

/* =============================================
   RENDER BANKS
   ============================================= */
function filterItems(bank) {
  const f = filterState[bank];
  return state[bank].filter(item => {
    if (f.difficulty && item.difficulty !== f.difficulty) return false;
    if (f.type && item.type !== f.type) return false;
    if (f.search) {
      const haystack = JSON.stringify(item).toLowerCase();
      if (!haystack.includes(f.search)) return false;
    }
    return true;
  });
}

function renderBank(bank) {
  const list = document.getElementById('list-' + bank);
  const items = filterItems(bank);
  if (items.length === 0) {
    const isEmpty = state[bank].length === 0;
    list.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 4h16v16H4z M4 9h16 M9 4v16"/></svg>
        <h3>${isEmpty ? '銀行還是空的' : '沒有符合的項目'}</h3>
        <p>${isEmpty ? '從刷題裡抓素材,慢慢養大。' : '試試清除篩選或調整搜尋。'}</p>
      </div>`;
    return;
  }
  list.innerHTML = items.map(item => renderCard(bank, item)).join('');
  list.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openModal(bank, btn.dataset.edit);
    });
  });
  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.delete;
      if (confirm('確定刪除這筆?')) {
        state[bank] = state[bank].filter(x => x.id !== id);
        persist();
        renderBank(bank);
      }
    });
  });
}

function renderCard(bank, item) {
  const diff = item.difficulty || 'B';
  const diffLabel = { A: '穩', B: '不穩', C: '弱' }[diff];
  const tags = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

  let body = '';
  if (bank === 'translations') {
    body = `
      <div class="card-meaning">${escapeHtml(item.meaning || '')}</div>
      ${item.exampleZh || item.exampleEn ? `
        <div class="card-example">
          ${item.exampleZh ? `<span class="lang-label">中</span><p>${escapeHtml(item.exampleZh)}</p>` : ''}
          ${item.exampleEn ? `<span class="lang-label">en</span><p>${escapeHtml(item.exampleEn)}</p>` : ''}
        </div>` : ''}
    `;
  } else if (bank === 'essays') {
    const typeLabel = { opening: '開頭', body: '段落', transition: '轉折/讓步', conclusion: '結尾' }[item.type] || '';
    body = `
      <div class="card-meaning">${escapeHtml(typeLabel)}${item.usage ? ' · ' + escapeHtml(item.usage) : ''}</div>
      ${item.example ? `<div class="card-example"><p>${escapeHtml(item.example)}</p></div>` : ''}
    `;
  } else if (bank === 'chinese') {
    body = `
      <div class="card-meaning">${escapeHtml(item.type)}${item.source ? ' · ' + escapeHtml(item.source) : ''}</div>
      ${item.usage ? `<div class="card-example"><p>${escapeHtml(item.usage)}</p></div>` : ''}
    `;
  }

  const titleField = bank === 'translations' ? 'pattern' : 'content';
  return `
    <div class="card">
      <div class="card-head">
        <h3 class="card-title">${escapeHtml(item[titleField] || '')}</h3>
        <div class="card-actions">
          <button data-edit="${item.id}" title="編輯">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20h9 M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button data-delete="${item.id}" class="danger" title="刪除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18 M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2 M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>
      ${body}
      <div class="card-foot">
        <div class="tag-list">${tags}</div>
        <div class="difficulty-dot"><span class="dot dot-${diff}"></span>${diff} · ${diffLabel}</div>
      </div>
    </div>`;
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* =============================================
   TABS
   ============================================= */
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'practice') resetPracticeUI();
});

/* =============================================
   MODAL  (add/edit)
   ============================================= */
const modalOverlay = document.getElementById('modal-overlay');
const modalBody = document.getElementById('modal-body');
const modalTitle = document.getElementById('modal-title');
const modalSaveBtn = document.getElementById('modal-save');
let editingContext = null; // { bank, id }

document.querySelectorAll('[data-add]').forEach(btn => {
  btn.addEventListener('click', () => openModal(btn.dataset.add, null));
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

function openModal(bank, id) {
  editingContext = { bank, id };
  const item = id ? state[bank].find(x => x.id === id) : null;
  modalTitle.textContent = (id ? '編輯' : '新增') + ' · ' + bankLabel(bank);
  modalBody.innerHTML = renderForm(bank, item);
  attachDifficultyPicker();
  modalOverlay.classList.add('show');
  setTimeout(() => modalBody.querySelector('input,textarea')?.focus(), 50);
}

function closeModal() {
  modalOverlay.classList.remove('show');
  editingContext = null;
}

function bankLabel(bank) {
  return { translations: '翻譯句型', essays: '英文作文', chinese: '國文素材' }[bank];
}

function renderForm(bank, item) {
  item = item || { difficulty: 'B', tags: [] };
  const diff = item.difficulty || 'B';
  const diffPicker = `
    <div class="diff-picker">
      <button type="button" class="diff-opt A ${diff==='A'?'selected':''}" data-diff="A"><span class="dot dot-A"></span>A · 穩</button>
      <button type="button" class="diff-opt B ${diff==='B'?'selected':''}" data-diff="B"><span class="dot dot-B"></span>B · 不穩</button>
      <button type="button" class="diff-opt C ${diff==='C'?'selected':''}" data-diff="C"><span class="dot dot-C"></span>C · 弱</button>
    </div>`;
  const tagsVal = (item.tags || []).join(', ');

  if (bank === 'translations') {
    return `
      <div class="field">
        <label>句型(英文)</label>
        <input id="f-pattern" type="text" placeholder="e.g. With the rapid development of X, ..." value="${escapeHtml(item.pattern || '')}">
        <div class="field-hint">用 X、Y 標出可替換的位置。</div>
      </div>
      <div class="field">
        <label>中文意思</label>
        <input id="f-meaning" type="text" placeholder="e.g. 隨著 X 的快速發展..." value="${escapeHtml(item.meaning || '')}">
      </div>
      <div class="field-row">
        <div class="field">
          <label>例句(中文)</label>
          <textarea id="f-exampleZh" placeholder="一個你寫過的具體中文例子">${escapeHtml(item.exampleZh || '')}</textarea>
        </div>
        <div class="field">
          <label>例句(英文)</label>
          <textarea id="f-exampleEn" placeholder="對應的英文翻譯">${escapeHtml(item.exampleEn || '')}</textarea>
        </div>
      </div>
      <div class="field">
        <label>標籤(以逗號分隔)</label>
        <input id="f-tags" type="text" placeholder="e.g. 萬用開頭, 趨勢, 學術" value="${escapeHtml(tagsVal)}">
      </div>
      <div class="field">
        <label>難度</label>
        ${diffPicker}
      </div>
    `;
  }

  if (bank === 'essays') {
    const typeOpts = [['opening','開頭'],['body','段落'],['transition','轉折/讓步'],['conclusion','結尾']];
    return `
      <div class="field">
        <label>類型</label>
        <select id="f-type">
          ${typeOpts.map(([v,l]) => `<option value="${v}" ${item.type===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>模板/句型</label>
        <textarea id="f-content" placeholder="e.g. Admittedly, X. However, this view overlooks Y.">${escapeHtml(item.content || '')}</textarea>
      </div>
      <div class="field">
        <label>使用情境/說明</label>
        <textarea id="f-usage" placeholder="什麼時候適合用?要注意什麼?">${escapeHtml(item.usage || '')}</textarea>
      </div>
      <div class="field">
        <label>具體應用例(選填)</label>
        <textarea id="f-example" placeholder="一段你實際寫過的例子">${escapeHtml(item.example || '')}</textarea>
      </div>
      <div class="field">
        <label>標籤(以逗號分隔)</label>
        <input id="f-tags" type="text" placeholder="e.g. 爭議, 舉例, 結尾" value="${escapeHtml(tagsVal)}">
      </div>
      <div class="field">
        <label>難度</label>
        ${diffPicker}
      </div>
    `;
  }

  // chinese
  const typeOpts = [['破題','破題'],['名句','名句'],['人物事件','人物/事件'],['結語','結語']];
  return `
    <div class="field">
      <label>類型</label>
      <select id="f-type">
        ${typeOpts.map(([v,l]) => `<option value="${v}" ${item.type===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>內容</label>
      <textarea id="f-content" placeholder="名句、模板、或人物事件的描述">${escapeHtml(item.content || '')}</textarea>
    </div>
    <div class="field">
      <label>出處/作者(選填)</label>
      <input id="f-source" type="text" placeholder="e.g. 王安石〈登飛來峰〉" value="${escapeHtml(item.source || '')}">
    </div>
    <div class="field">
      <label>使用情境/說明</label>
      <textarea id="f-usage" placeholder="哪些主題適合用?">${escapeHtml(item.usage || '')}</textarea>
    </div>
    <div class="field">
      <label>標籤/主題(以逗號分隔)</label>
      <input id="f-tags" type="text" placeholder="e.g. 堅持, 視野, 挫折" value="${escapeHtml(tagsVal)}">
    </div>
    <div class="field">
      <label>難度</label>
      ${diffPicker}
    </div>
  `;
}

function attachDifficultyPicker() {
  const pickerWrap = modalBody.querySelector('.diff-picker');
  if (!pickerWrap) return;
  pickerWrap.addEventListener('click', e => {
    const btn = e.target.closest('.diff-opt');
    if (!btn) return;
    pickerWrap.querySelectorAll('.diff-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
}

modalSaveBtn.addEventListener('click', () => {
  if (!editingContext) return;
  const { bank, id } = editingContext;
  const tags = (modalBody.querySelector('#f-tags')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
  const diffEl = modalBody.querySelector('.diff-opt.selected');
  const difficulty = diffEl ? diffEl.dataset.diff : 'B';

  let payload = { tags, difficulty };
  if (bank === 'translations') {
    payload.pattern = modalBody.querySelector('#f-pattern').value.trim();
    payload.meaning = modalBody.querySelector('#f-meaning').value.trim();
    payload.exampleZh = modalBody.querySelector('#f-exampleZh').value.trim();
    payload.exampleEn = modalBody.querySelector('#f-exampleEn').value.trim();
    if (!payload.pattern) { alert('請填寫句型'); return; }
  } else if (bank === 'essays') {
    payload.type = modalBody.querySelector('#f-type').value;
    payload.content = modalBody.querySelector('#f-content').value.trim();
    payload.usage = modalBody.querySelector('#f-usage').value.trim();
    payload.example = modalBody.querySelector('#f-example').value.trim();
    if (!payload.content) { alert('請填寫模板內容'); return; }
  } else if (bank === 'chinese') {
    payload.type = modalBody.querySelector('#f-type').value;
    payload.content = modalBody.querySelector('#f-content').value.trim();
    payload.source = modalBody.querySelector('#f-source').value.trim();
    payload.usage = modalBody.querySelector('#f-usage').value.trim();
    if (!payload.content) { alert('請填寫內容'); return; }
  }

  if (id) {
    const idx = state[bank].findIndex(x => x.id === id);
    if (idx >= 0) state[bank][idx] = { ...state[bank][idx], ...payload };
  } else {
    state[bank].push({ id: uid(), createdAt: Date.now(), ...payload });
  }
  persist();
  renderBank(bank);
  closeModal();
});

/* =============================================
   EXPORT / IMPORT
   ============================================= */
document.getElementById('btn-export').addEventListener('click', () => {
  const data = JSON.stringify({ version: '1.0', exportedAt: new Date().toISOString(), ...state }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `template-bank-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.translations && !imported.essays && !imported.chinese) {
        alert('檔案格式不正確'); return;
      }
      if (!confirm('要匯入並覆蓋現有資料嗎?(建議先匯出備份)')) return;
      state = {
        translations: imported.translations || [],
        essays: imported.essays || [],
        chinese: imported.chinese || []
      };
      persist();
      renderBank('translations');
      renderBank('essays');
      renderBank('chinese');
      alert('匯入完成');
    } catch (err) {
      alert('匯入失敗:' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* =============================================
   PRACTICE MODE
   ============================================= */
let session = null; // { items, idx, known, unknown, flipped }

document.getElementById('start-practice').addEventListener('click', startPractice);
document.getElementById('end-practice').addEventListener('click', endPractice);
document.getElementById('restart-practice').addEventListener('click', resetPracticeUI);

function resetPracticeUI() {
  session = null;
  document.getElementById('practice-setup').style.display = '';
  document.getElementById('practice-active').style.display = 'none';
  document.getElementById('practice-end').style.display = 'none';
}

function startPractice() {
  const bankSel = document.getElementById('practice-bank').value;
  const diffSel = document.getElementById('practice-difficulty').value;
  const countSel = document.getElementById('practice-count').value;

  let pool = [];
  if (bankSel === 'all') {
    state.translations.forEach(x => pool.push({ bank: 'translations', item: x }));
    state.essays.forEach(x => pool.push({ bank: 'essays', item: x }));
    state.chinese.forEach(x => pool.push({ bank: 'chinese', item: x }));
  } else {
    state[bankSel].forEach(x => pool.push({ bank: bankSel, item: x }));
  }

  if (diffSel === 'BC') pool = pool.filter(p => p.item.difficulty === 'B' || p.item.difficulty === 'C');
  else if (diffSel === 'C') pool = pool.filter(p => p.item.difficulty === 'C');
  else if (diffSel === 'A') pool = pool.filter(p => p.item.difficulty === 'A');

  if (pool.length === 0) {
    alert('沒有符合條件的題目。試試調整篩選或先去新增資料。');
    return;
  }

  // shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (countSel !== 'all') pool = pool.slice(0, Number(countSel));

  session = { items: pool, idx: 0, known: 0, unknown: 0, flipped: false };
  document.getElementById('practice-setup').style.display = 'none';
  document.getElementById('practice-active').style.display = '';
  renderFlashcard();
}

function renderFlashcard() {
  const { items, idx, flipped } = session;
  const total = items.length;
  document.getElementById('practice-counter').textContent = `第 ${idx + 1} / ${total} 題`;
  document.getElementById('progress-fill').style.width = `${(idx / total) * 100}%`;

  const { bank, item } = items[idx];
  const flashcard = document.getElementById('flashcard');

  let frontHtml = '', backHtml = '';
  if (bank === 'translations') {
    frontHtml = `
      <div class="face-label">中文 → 英文</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.meaning || '(無中文意思)')}</p>
        ${item.exampleZh ? `<p class="ctx">${escapeHtml(item.exampleZh)}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.pattern)}</div>
        ${item.exampleEn ? `<div class="extras"><span class="lang-label">en</span>${escapeHtml(item.exampleEn)}</div>` : ''}
        ${item.exampleZh ? `<div class="extras"><span class="lang-label">中</span>${escapeHtml(item.exampleZh)}</div>` : ''}
      </div>`;
  } else if (bank === 'essays') {
    const typeLabel = { opening: '開頭', body: '段落', transition: '轉折/讓步', conclusion: '結尾' }[item.type] || '';
    frontHtml = `
      <div class="face-label">英文作文 · ${escapeHtml(typeLabel)}</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.usage || '想想這類型的句型...')}</p>
        ${(item.tags||[]).length ? `<p class="ctx">${item.tags.map(t=>'#'+escapeHtml(t)).join(' ')}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.content)}</div>
        ${item.example ? `<div class="extras"><strong>例:</strong> ${escapeHtml(item.example)}</div>` : ''}
      </div>`;
  } else {
    frontHtml = `
      <div class="face-label">國文素材 · ${escapeHtml(item.type)}</div>
      <div class="content">
        <p class="prompt-text">${escapeHtml(item.usage || (item.tags||[]).join(' / ') || '回想這個素材...')}</p>
        ${item.source ? `<p class="ctx">${escapeHtml(item.source)}</p>` : ''}
      </div>`;
    backHtml = `
      <div class="face-label">答案</div>
      <div class="content">
        <div class="answer">${escapeHtml(item.content)}</div>
        ${item.source ? `<div class="extras"><strong>出處:</strong> ${escapeHtml(item.source)}</div>` : ''}
        ${item.usage ? `<div class="extras"><strong>用途:</strong> ${escapeHtml(item.usage)}</div>` : ''}
      </div>`;
  }

  flashcard.innerHTML = flipped ? backHtml : frontHtml;
  const actions = document.getElementById('flashcard-actions');
  if (!flipped) {
    actions.innerHTML = `<button class="btn btn-flip" id="btn-flip">翻面看答案</button>`;
    document.getElementById('btn-flip').addEventListener('click', () => { session.flipped = true; renderFlashcard(); });
  } else {
    actions.innerHTML = `
      <button class="btn btn-known" id="btn-known">會了 →</button>
      <button class="btn btn-unknown" id="btn-unknown">需加強 →</button>
    `;
    document.getElementById('btn-known').addEventListener('click', () => mark('known'));
    document.getElementById('btn-unknown').addEventListener('click', () => mark('unknown'));
  }
}

function mark(result) {
  const cur = session.items[session.idx];
  if (result === 'known') {
    session.known++;
    // promote difficulty: C→B, B→A (don't auto-promote A)
    if (cur.item.difficulty === 'C') cur.item.difficulty = 'B';
    else if (cur.item.difficulty === 'B') cur.item.difficulty = 'A';
  } else {
    session.unknown++;
    // demote: A→B, B→C, C stays C
    if (cur.item.difficulty === 'A') cur.item.difficulty = 'B';
    else if (cur.item.difficulty === 'B') cur.item.difficulty = 'C';
  }
  cur.item.lastReviewed = Date.now();
  cur.item.reviewCount = (cur.item.reviewCount || 0) + 1;
  // update in state
  const idx = state[cur.bank].findIndex(x => x.id === cur.item.id);
  if (idx >= 0) state[cur.bank][idx] = cur.item;

  session.idx++;
  session.flipped = false;
  if (session.idx >= session.items.length) {
    persist();
    renderBank('translations');
    renderBank('essays');
    renderBank('chinese');
    showSessionEnd();
  } else {
    renderFlashcard();
  }
}

function showSessionEnd() {
  document.getElementById('practice-active').style.display = 'none';
  document.getElementById('practice-end').style.display = '';
  document.getElementById('stat-known').textContent = session.known;
  document.getElementById('stat-unknown').textContent = session.unknown;
  document.getElementById('stat-total').textContent = session.items.length;
}

function endPractice() {
  if (!session) return resetPracticeUI();
  if (session.idx > 0 && confirm('要結束這輪嗎?目前的進度會儲存。')) {
    persist();
    showSessionEnd();
  } else if (session.idx === 0) {
    resetPracticeUI();
  }
}

renderBank('translations');
renderBank('essays');
renderBank('chinese');

// First-time save (in case using seed data)
if (!loadData()) persist();


    } catch (e) {
      showError('INIT', e);
    }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
  
  window.addEventListener('error', function(ev) {
    showError('RUNTIME', ev.error || ev.message);
  });
})();
</script>
